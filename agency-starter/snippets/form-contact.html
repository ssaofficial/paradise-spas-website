<!-- PASTE where you want a contact form -->
<section class="lead-form-section" id="contact">
  <h2>Get in touch</h2>
  <p>Tell us what you need — we&rsquo;ll follow up shortly.</p>
  <div class="lead-form-shell"
       data-native-form
       data-lead-source="contact-page"
       data-submit-label="Send Message &rarr;"
       data-show-message="true"
       data-lead-success="thank-you"
       data-form-id="contact-lead-form"
       data-error-id="contact-lead-error"></div>
</section>
