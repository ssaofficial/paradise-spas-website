<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico?v=20260710" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260710">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260710">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=20260710">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Paradise Spas</title>
  <meta name="robots" content="noindex, follow">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=20260701-mobile">
  <style>
    body {
      margin: 0;
      background: #f6f8fb;
      color: #102033;
      font-family: "Inter", sans-serif;
    }

    .not-found {
      display: grid;
      min-height: 72vh;
      place-items: center;
      padding: 48px 18px;
      text-align: center;
    }

    .not-found-card {
      width: min(100%, 680px);
      padding: 36px 24px;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 14px 34px rgba(16, 32, 51, 0.12);
    }

    .not-found h1 {
      margin: 0 0 12px;
      color: #0d2d63;
      font-family: "Montserrat", sans-serif;
      font-size: clamp(2.4rem, 9vw, 5rem);
      line-height: 1;
    }

    .not-found p {
      margin: 0 auto 24px;
      max-width: 520px;
      color: #4a5568;
      font-size: 17px;
      line-height: 1.65;
    }

    .not-found a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: 9px;
      background: #d71920;
      color: #fff;
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      text-decoration: none;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="announcement-bar">Paradise Spas and Outdoor Living &mdash; Minot, ND</div>
  <main class="not-found">
    <section class="not-found-card" aria-labelledby="not-found-title">
      <h1 id="not-found-title">404</h1>
      <p>That page is not available. The active fair inventory changes quickly, so use the current inventory page to find the right spa.</p>
      <a href="/active-inventory/">View Active Inventory</a>
    </section>
  </main>
</body>
</html>
